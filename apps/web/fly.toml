app = "categories-web"
primary_region = "sjc"

[build]
  dockerfile = "../../Dockerfile.web"

  [build.args]
    VITE_SOCKET_URL = "https://api.categories.zachbroad.com"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
